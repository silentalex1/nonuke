<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkvertise Bypass</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4285F4;
            --background-color: #F8F9FA;
            --text-color: #202124;
            --card-bg: #FFFFFF;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s ease;
        }

        .dark-mode {
            --primary-color: #8AB4F8;
            --background-color: #121212;
            --text-color: #E8EAED;
            --card-bg: #1F1F1F;
            --shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            border-radius: 10px;
            padding: 10px 20px;
            z-index: 1000;
            display: flex;
            gap: 15px;
        }

        .nav-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
        }

        .nav-button:hover {
            background-color: #3367D6;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            margin: 20px 0;
        }

        .input-group input,
        .input-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .input-group button {
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color var(--transition);
        }

        .input-group button:hover {
            background-color: #3367D6;
        }

        .notification-tray {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 4000000;
        }

        .notification {
            position: block;
            margin: 10px;
            padding: 10px;
            padding-right: 20px;
            background-color: #25262b;
            color: white;
            transition: opacity 0.6s;
            width: 300px;
            border-radius: 10px;
            border: 2px solid #3b5bdb;
            animation: glow 1s ease-in-out infinite alternate;
        }

        .notification .grid-container {
            display: grid;
            grid-template-columns: auto auto;
            gap: 10px;
        }

        .notification .links {
            display: flex;
            justify-content: right;
            align-items: center;
        }

        .notification .links span {
            padding-bottom: 4px;
            opacity: 0.7;
        }

        .notification .links a,
        .notification .links span {
            display: block;
            color: white;
            font-size: 0.8rem;
            padding: 5px;
            margin-bottom: 5px;
        }

        .grid-item img {
            margin-top: 15px;
            margin-right: 5px;
            width: 32px;
        }

        .grid-item h3 {
            padding-top: 10px;
            padding-bottom: 3px;
            font-size: 1.5rem;
            color: white;
        }

        .grid-item p {
            font-style: italic;
            font-size: 1rem;
            color: white;
        }

        .grid-item p a {
            opacity: 1;
            font-weight: 600;
            text-decoration: underline !important;
            margin-bottom: 8px;
            display: inline-block;
        }

        .grid-item h3,
        .grid-item p {
            margin: 0;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 10px #3b5bdb;
            }

            to {
                box-shadow: 0 0 20px #3b5bdb;
            }
        }
    </style>
</head>

<body>
    <div class="navbar">
        <button class="nav-button" onclick="location.href='index.html'">Home</button>
        <button class="nav-button" onclick="location.href='adblocker.html'">Adblocker</button>
        <button class="nav-button" onclick="location.href='bypass.html'">Linkvertise Bypass</button>
    </div>

    <div class="container">
        <h1>Linkvertise Bypass</h1>
        <div class="input-group">
            <input type="text" id="linkInput" placeholder="Enter the Linkvertise link">
            <input type="text" id="mainLinkInput" placeholder="Enter the main website link">
            <select id="bypassType">
                <option value="Linkvertise">Linkvertise</option>
                <option value="Link">Link</option>
            </select>
            <button id="bypassButton">Bypass Link</button>
        </div>
    </div>

    <div id="notification-tray"></div>

    <script>
        document.getElementById('bypassButton').addEventListener('click', () => {
            const linkvertiseLink = document.getElementById('linkInput').value;
            const mainLink = document.getElementById('mainLinkInput').value;
            const bypassType = document.getElementById('bypassType').value;

            if (!linkvertiseLink && bypassType === 'Linkvertise') {
                alert('Please enter a Linkvertise link.');
                return;
            }

            if (!mainLink && bypassType === 'Link') {
                alert('Please enter the main website link.');
                return;
            }

            if (bypassType === 'Linkvertise' && linkvertiseLink.startsWith('https://linkvertise.com/')) {
                const urlParams = new URLSearchParams(new URL(linkvertiseLink).search);
                const actualLink = urlParams.get('u');
                if (actualLink) {
                    showNotification('Bypassing Linkvertise', 'Redirecting...');
                    setTimeout(() => {
                        window.location.href = actualLink;
                    }, 2000);
                } else {
                    alert('Failed to retrieve the actual link.');
                }
            } else if (bypassType === 'Link') {
                showNotification('Bypassing Main Link', 'Redirecting...');
                setTimeout(() => {
                    window.location.href = mainLink;
                }, 2000);
            }
        });

        function showNotification(title, text) {
            const tray = document.getElementById('notification-tray');
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `
                <div class="grid-container">
                    <div class="grid-item">
                        <img height="32" src="logo.svg" alt="B">
                    </div>
                    <div class="grid-item">
                        <h3>${title}</h3>
                        <p>${text}</p>
                    </div>
                </div>
                <div class="links">
                    <span id="version">Release</span>
                    <span>&#8226;</span>
                    <a href="https://discord.gg/tX8G9G5BMV">Get Support</a>
                    <span>&#8226;</span>
                    <a href="https://bypass.city/privacy">Privacy Policy</a>
                </div>
            `;
            tray.appendChild(notification);
            setTimeout(() => {
                notification.remove();
            }, 5000);
        }
    </script>
</body>

</html>
