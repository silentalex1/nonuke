<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Nuke</title>
    <style>
        :root {
            --primary-color: #8a2be2;
            --secondary-color: #4a0082;
            --background-gradient: linear-gradient(135deg, #1c1c1c, #2e2e2e);
            --text-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.3);
            --input-background: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background-gradient);
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 0 0 20px var(--primary-color);
            font-weight: bold;
            letter-spacing: 2px;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .search-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .search-box {
            background-color: var(--input-background);
            border: 2px solid var(--primary-color);
            border-radius: 30px;
            padding: 12px 20px;
            width: 400px;
            color: var(--text-color);
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            box-shadow: 0 0 15px var(--primary-color);
        }

        .search-button {
            background-color: var(--primary-color);
            color: var(--text-color);
            border: none;
            border-radius: 30px;
            padding: 12px 25px;
            margin-left: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-button:hover {
            background-color: var(--secondary-color);
            box-shadow: 0 0 15px var(--primary-color);
        }

        .mini-browser {
            width: 80%;
            max-width: 1000px;
            height: 400px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .mini-browser::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://via.placeholder.com/1000x400/000000/555555?text=Your+Content') center/cover no-repeat;
            opacity: 0.2;
        }

        .mini-browser-content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            font-size: 1.5em;
        }

        footer {
            margin-top: 30px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">No Nuke</div>
        <div class="search-container">
            <input type="text" class="search-box" placeholder="Enter URL to unblock...">
            <button class="search-button">Unblock</button>
        </div>
        <div class="mini-browser">
            <div class="mini-browser-content">
                Your Content Goes Here
            </div>
        </div>
        <footer>
            &copy; 2024 No Nuke. All rights reserved.
        </footer>
    </div>
</body>
</html>
