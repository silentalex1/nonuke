<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Nuke</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }
        #background {
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(103, 58, 183, 0.1) 0%, rgba(103, 58, 183, 0) 40%),
                radial-gradient(circle at 100% 100%, rgba(131, 58, 180, 0.1) 0%, rgba(131, 58, 180, 0) 40%),
                linear-gradient(135deg, #000000 0%, #1a0033 30%, #2d0054 60%, #3b0066 100%);
            position: relative;
            overflow: hidden;
        }
        .navbar {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 8px;
            display: flex;
            gap: 8px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }
        .nav-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 16px 32px;
            border-radius: 40px;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .nav-button:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }
        .nav-button:hover:before {
            transform: translateX(100%);
        }
        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }
        .mini-browser {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 70%;
            background-color: #0a0a0a;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .browser-bar {
            height: 60px;
            background-color: #1a0033;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .url-input {
            flex-grow: 1;
            height: 40px;
            background-color: #2d0054;
            border: none;
            border-radius: 20px;
            color: white;
            padding: 0 20px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        .url-input:focus {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
        }
        .browser-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }
        .url-prompt {
            font-size: 24px;
            color: #ffffff;
            opacity: 0.7;
            text-align: center;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: all 0.5s ease;
            position: absolute;
            z-index: 2;
        }
        .url-prompt:focus {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            outline: none;
        }
        .url-prompt.vanish {
            opacity: 0;
            transform: scale(0.8);
        }
        .url-prompt.bottom {
            top: calc(100% - 80px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            padding: 10px 20px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="background">
        <nav class="navbar">
            <a href="#" class="nav-button">Movies</a>
            <a href="#" class="nav-button">Games</a>
            <a href="#" class="nav-button">ToS</a>
            <a href="#" class="nav-button">Settings</a>
        </nav>
        <div class="mini-browser">
            <div class="browser-bar">
                <input type="text" class="url-input" placeholder="Enter URL" id="urlInput">
            </div>
            <div class="browser-content" id="browserContent">
                <div class="url-prompt" contenteditable="true" id="urlPrompt">Enter an URL</div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const urlPrompt = document.getElementById('urlPrompt');
        const browserContent = document.getElementById('browserContent');

        urlPrompt.addEventListener('input', function() {
            let text = this.textContent;
            if (text.includes('://')) {
                text = text.split('://')[1];
            }
            if (text.includes('/')) {
                text = text.split('/')[0];
            }
            urlInput.value = text;
        });

        urlPrompt.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                this.blur();
                loadURL();
            }
        });

        urlPrompt.addEventListener('focus', function() {
            if (this.textContent === 'Enter an URL') {
                this.textContent = '';
            }
        });

        urlPrompt.addEventListener('blur', function() {
            if (this.textContent.trim() === '') {
                this.textContent = 'Enter an URL';
            }
        });

        function loadURL() {
            let url = urlInput.value;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            urlPrompt.classList.add('vanish');

            setTimeout(() => {
                const iframe = document.createElement('iframe');
                iframe.src = url;
                browserContent.appendChild(iframe);

                urlPrompt.classList.remove('vanish');
                urlPrompt.classList.add('bottom');
                document.body.appendChild(urlPrompt);
            }, 500);
        }

        urlInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loadURL();
            }
        });
    </script>
</body>
</html>
