<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Extension Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4285F4;
            --secondary-color: #34A853;
            --background-color: #F5F5F5;
            --text-color: #333333;
        }
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--background-color);
            color: var(--text-color);
        }
        .container {
            background-color: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-weight: 700;
            text-align: center;
        }
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        #extensionInput {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        #extensionInput:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
        }
        #downloadButton {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s ease;
            width: 100%;
            font-weight: 700;
        }
        #downloadButton:hover {
            background-color: #3367D6;
        }
        #status {
            margin-top: 1.5rem;
            text-align: center;
            font-weight: 300;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chrome Extension Downloader</h1>
        <div class="input-group">
            <input type="text" id="extensionInput" placeholder="Enter Chrome extension ID">
        </div>
        <button id="downloadButton">Download Extension</button>
        <div class="loader" id="loader"></div>
        <div id="status"></div>
    </div>

    <script>
        class ExtensionManager {
            constructor() {
                this.API_ENDPOINT = 'https://chrome.google.com/webstore/ajax/detail';
                this.INSTALL_ENDPOINT = 'https://clients2.google.com/service/update2/crx';
                this.cache = new Map();
                this.rateLimiter = {
                    tokens: 5,
                    lastRefill: Date.now(),
                    refill: function() {
                        const now = Date.now();
                        const timePassed = now - this.lastRefill;
                        const refillAmount = Math.floor(timePassed / 1000) * 5;
                        this.tokens = Math.min(5, this.tokens + refillAmount);
                        this.lastRefill = now;
                    }
                };
            }

            async getExtensionDetails(extensionId) {
                if (this.cache.has(extensionId)) {
                    return this.cache.get(extensionId);
                }

                await this.acquireToken();
                const response = await fetch(`${this.API_ENDPOINT}?id=${extensionId}`);
                const data = await response.json();

                const details = {
                    id: extensionId,
                    name: data[1][1],
                    version: data[1][6],
                    icon: data[1][3][2]
                };

                this.cache.set(extensionId, details);
                return details;
            }

            async downloadExtension(extensionId) {
                const details = await this.getExtensionDetails(extensionId);
                const url = `${this.INSTALL_ENDPOINT}?response=redirect&prodversion=49.0&x=id%3D${extensionId}%26installsource%3Dondemand%26uc`;
                
                const response = await fetch(url);
                const blob = await response.blob();
                
                const fileName = `${details.name.replace(/[^a-z0-9]/gi, '_')}_${details.version}.crx`;
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = fileName;
                link.click();
                URL.revokeObjectURL(link.href);
            }

            async acquireToken() {
                this.rateLimiter.refill();
                if (this.rateLimiter.tokens < 1) {
                    const waitTime = 1000 - (Date.now() - this.rateLimiter.lastRefill);
                    await new Promise(resolve => setTimeout(resolve, waitTime));
                    this.rateLimiter.refill();
                }
                this.rateLimiter.tokens--;
            }
        }

        const manager = new ExtensionManager();
        const input = document.getElementById('extensionInput');
        const downloadButton = document.getElementById('downloadButton');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        async function downloadExtension() {
            const extensionId = input.value.trim();
            if (!extensionId) {
                status.textContent = 'Please enter a valid extension ID.';
                return;
            }

            status.textContent = '';
            loader.style.display = 'block';
            downloadButton.disabled = true;

            try {
                await manager.downloadExtension(extensionId);
                status.textContent = 'Download complete!';
                status.style.color = 'var(--secondary-color)';
            } catch (error) {
                status.textContent = 'Error: ' + error.message;
                status.style.color = '#D93025';
            } finally {
                loader.style.display = 'none';
                downloadButton.disabled = false;
            }
        }

        downloadButton.addEventListener('click', downloadExtension);
        input.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                downloadExtension();
            }
        });
    </script>
</body>
</html>
