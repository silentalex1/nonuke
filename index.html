<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Extension Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #4285F4;
            --secondary-color: #34A853;
            --background-color: #F8F9FA;
            --text-color: #202124;
            --card-bg: #FFFFFF;
            --input-bg: #FFFFFF;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        .dark-mode {
            --primary-color: #8AB4F8;
            --secondary-color: #81C995;
            --background-color: #202124;
            --text-color: #E8EAED;
            --card-bg: #303134;
            --input-bg: #303134;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            transition: var(--transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            transition: var(--transition);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        #extensionInput {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            font-size: 1rem;
            border: 2px solid var(--primary-color);
            border-radius: 50px;
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: var(--transition);
        }

        #extensionInput:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.3);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
        }

        #downloadButton {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 50px;
            transition: var(--transition);
            width: 100%;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #downloadButton:hover {
            background-color: #3367D6;
            transform: translateY(-2px);
        }

        #downloadButton:active {
            transform: translateY(0);
        }

        #status {
            margin-top: 1.5rem;
            text-align: center;
            font-weight: 400;
        }

        .loader {
            border: 3px solid var(--card-bg);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .toggle-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.toggle-slider {
            background-color: var(--primary-color);
        }

        input:checked+.toggle-slider:before {
            transform: translateX(26px);
        }

        .extension-info {
            display: none;
            margin-top: 2rem;
            padding: 1rem;
            background-color: var(--input-bg);
            border-radius: 10px;
            transition: var(--transition);
        }

        .extension-info h2 {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .extension-details {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .extension-icon {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            margin-right: 1rem;
            object-fit: cover;
        }

        .extension-text {
            flex-grow: 1;
        }

        .extension-text p {
            margin-bottom: 0.5rem;
        }

        .download-options {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }

        .download-option {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 50px;
            transition: var(--transition);
        }

        .download-option:hover {
            background-color: #3367D6;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            #extensionInput,
            #downloadButton {
                font-size: 0.9rem;
            }

            .extension-icon {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>

<body>
    <div class="toggle-container">
        <label class="toggle-switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="toggle-slider"></span>
        </label>
    </div>
    <div class="container">
        <h1>Chrome Extension Manager</h1>
        <div class="input-group">
            <i class="fas fa-search input-icon"></i>
            <input type="text" id="extensionInput" placeholder="Enter Chrome extension ID or URL">
        </div>
        <button id="downloadButton">
            <div class="loader" id="loader"></div>
            Download Extension
        </button>
        <div id="status"></div>
        <div class="extension-info" id="extensionInfo">
            <h2>Extension Details</h2>
            <div class="extension-details">
                <img id="extensionIcon" class="extension-icon" src="" alt="Extension Icon">
                <div class="extension-text">
                    <p><strong>Name:</strong> <span id="extensionName"></span></p>
                    <p><strong>Version:</strong> <span id="extensionVersion"></span></p>
                    <p><strong>ID:</strong> <span id="extensionId"></span></p>
                </div>
            </div>
            <div class="download-options">
                <button class="download-option" id="downloadCRX">Download CRX</button>
                <button class="download-option" id="downloadZIP">Download ZIP</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        class ExtensionManager {
            constructor() {
                this.API_ENDPOINT = 'https://clients2.google.com/service/update2/crx';
                this.cache = new Map();
            }

            async getExtensionDetails(extensionId) {
                if (this.cache.has(extensionId)) {
                    return this.cache.get(extensionId);
                }
                const response = await fetch(`${this.API_ENDPOINT}?response=redirect&id=${extensionId}`);
                if (!response.ok) {
                    throw new Error('Failed to fetch extension details');
                }
                const details = await response.json();
                this.cache.set(extensionId, details);
                return details;
            }

            async downloadCRX(extensionId) {
                const response = await fetch(`${this.API_ENDPOINT}?response=redirect&prodversion=49.0&x=id%3D${extensionId}%26installsource%3Dondemand%26uc`);
                if (!response.ok) {
                    throw new Error('Failed to download CRX');
                }
                const crxBlob = await response.blob();
                return crxBlob;
            }

            async convertCRXToZIP(crxBlob, extensionName) {
                const zip = new JSZip();
                zip.file(`${extensionName}.crx`, crxBlob);
                const zipBlob = await zip.generateAsync({ type: "blob" });
                return zipBlob;
            }
        }

        const manager = new ExtensionManager();
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
            } else {
                body.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
            }
        });

        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark-mode');
            darkModeToggle.checked = true;
        }

        document.getElementById('downloadButton').addEventListener('click', async () => {
            const extensionInput = document.getElementById('extensionInput').value.trim();
            const extensionId = getExtensionId(extensionInput);

            if (!extensionId) {
                showStatus('Please enter a valid extension ID or URL.');
                return;
            }

            showLoader(true);

            try {
                const details = await manager.getExtensionDetails(extensionId);
                showExtensionInfo(details);
                showStatus('');
            } catch (error) {
                showStatus('Failed to fetch extension details. Try again.');
            } finally {
                showLoader(false);
            }
        });

        document.getElementById('downloadCRX').addEventListener('click', async () => {
            const extensionInput = document.getElementById('extensionInput').value.trim();
            const extensionId = getExtensionId(extensionInput);

            if (!extensionId) {
                showStatus('Please enter a valid extension ID or URL.');
                return;
            }

            showLoader(true);

            try {
                const crxBlob = await manager.downloadCRX(extensionId);
                const url = URL.createObjectURL(crxBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${extensionId}.crx`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showStatus('CRX Download started!');
            } catch (error) {
                showStatus('Failed to download the extension. Try again.');
            } finally {
                showLoader(false);
            }
        });

        document.getElementById('downloadZIP').addEventListener('click', async () => {
            const extensionInput = document.getElementById('extensionInput').value.trim();
            const extensionId = getExtensionId(extensionInput);

            if (!extensionId) {
                showStatus('Please enter a valid extension ID or URL.');
                return;
            }

            showLoader(true);

            try {
                const crxBlob = await manager.downloadCRX(extensionId);
                const details = await manager.getExtensionDetails(extensionId);
                const zipBlob = await manager.convertCRXToZIP(crxBlob, details.name);
                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${details.name}.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showStatus('ZIP Download started!');
            } catch (error) {
                showStatus('Failed to download ZIP. Try again.');
            } finally {
                showLoader(false);
            }
        });

        function getExtensionId(input) {
            const idRegex = /^[a-zA-Z0-9]{32}$/; // Corrected regex for extension IDs
            if (idRegex.test(input)) {
                return input;
            }
            const url = new URL(input);
            if (url.hostname === 'chrome.google.com') {
                const id = url.pathname.split('/').pop();
                return idRegex.test(id) ? id : null;
            }
            return null;
        }

        function showLoader(visible) {
            const loader = document.getElementById('loader');
            loader.style.display = visible ? 'inline-block' : 'none';
        }

        function showStatus(message) {
            const status = document.getElementById('status');
            status.textContent = message;
        }

        function showExtensionInfo(details) {
            const infoContainer = document.getElementById('extensionInfo');
            document.getElementById('extensionIcon').src = details.icon; // Assuming details have icon
            document.getElementById('extensionName').textContent = details.name; // Assuming details have name
            document.getElementById('extensionVersion').textContent = details.version; // Assuming details have version
            document.getElementById('extensionId').textContent = details.id; // Assuming details have id
            infoContainer.style.display = 'block';
        }
    </script>
</body>

</html>
