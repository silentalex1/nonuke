<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonuke</title>
    <style>
        body {
            background-color: #2E003E;
            color: #D3D3D3;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #000000;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .background {
            background: linear-gradient(135deg, #2E003E, #000000);
            background-size: cover;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .background::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.5), transparent);
            z-index: 1;
        }
        .content {
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-size: 3em;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Nonuke</h1>
    </div>
    <div class="background">
        <div class="content">
        </div>
    </div>
</body>
</html>
