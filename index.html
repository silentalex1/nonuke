<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Nuke</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #1a0033;
            font-family: 'Poppins', sans-serif;
        }
        #background {
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(103, 58, 183, 0.1) 0%, rgba(103, 58, 183, 0) 40%),
                radial-gradient(circle at 100% 100%, rgba(131, 58, 180, 0.1) 0%, rgba(131, 58, 180, 0) 40%),
                linear-gradient(135deg, #1a0033 0%, #2d0054 50%, #3b0066 100%);
            position: relative;
            overflow: hidden;
        }
        .shape {
            position: absolute;
            opacity: 0.03;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s ease;
        }
        .circle {
            border-radius: 50%;
        }
        .square {
            border-radius: 30px;
        }
        .rectangle {
            border-radius: 40px;
        }
        .navbar {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 8px;
            display: flex;
            gap: 8px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .nav-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 16px 32px;
            border-radius: 40px;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .nav-button:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }
        .nav-button:hover:before {
            transform: translateX(100%);
        }
        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div id="background">
        <div class="shape circle" style="width: 600px; height: 600px; top: -10%; left: -10%;"></div>
        <div class="shape square" style="width: 350px; height: 350px; top: 60%; left: 80%;"></div>
        <div class="shape rectangle" style="width: 700px; height: 350px; top: 40%; left: 20%; transform: rotate(45deg);"></div>
        <div class="shape circle" style="width: 300px; height: 300px; top: 70%; left: 10%;"></div>
        <div class="shape square" style="width: 250px; height: 250px; top: 20%; left: 70%;"></div>
        <div class="shape rectangle" style="width: 450px; height: 180px; top: 55%; left: 50%; transform: rotate(-30deg);"></div>

        <nav class="navbar">
            <a href="#" class="nav-button">Movies</a>
            <a href="#" class="nav-button">Games</a>
            <a href="#" class="nav-button">ToS</a>
        </nav>
    </div>
</body>
</html>
