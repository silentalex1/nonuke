<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Nuke</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: radial-gradient(circle at center, #1a0b2e 0%, #0a0a0a 70%);
            position: relative;
        }
        .logo {
            font-size: 4em;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #8a2be2;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .search-box {
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid #8a2be2;
            border-radius: 30px;
            padding: 15px 25px;
            width: 350px;
            color: #ffffff;
            font-size: 1.1em;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-box:focus {
            box-shadow: 0 0 15px #8a2be2;
        }
        .search-box::placeholder {
            color: #cccccc;
        }
        .button {
            margin-top: 25px;
            padding: 12px 30px;
            background-color: #8a2be2;
            color: #ffffff;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .button:hover {
            background-color: #9b4dff;
            box-shadow: 0 0 15px #8a2be2;
            transform: translateY(-2px);
        }
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .particle {
            position: absolute;
            background-color: rgba(138, 43, 226, 0.3);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% {transform: translate(0, 0);}
            25% {transform: translate(50px, -50px);}
            50% {transform: translate(-50px, -100px);}
            75% {transform: translate(-100px, 50px);}
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle" style="width: 15px; height: 15px; left: 10%; top: 20%; animation-delay: 0s;"></div>
        <div class="particle" style="width: 20px; height: 20px; left: 20%; top: 80%; animation-delay: 2s;"></div>
        <div class="particle" style="width: 12px; height: 12px; left: 60%; top: 40%; animation-delay: 4s;"></div>
        <div class="particle" style="width: 18px; height: 18px; left: 80%; top: 10%; animation-delay: 6s;"></div>
        <div class="particle" style="width: 10px; height: 10px; left: 45%; top: 70%; animation-delay: 8s;"></div>
        <div class="particle" style="width: 16px; height: 16px; left: 30%; top: 50%; animation-delay: 10s;"></div>
        <div class="particle" style="width: 14px; height: 14px; left: 70%; top: 30%; animation-delay: 12s;"></div>
    </div>
    <div class="container">
        <div class="logo">No Nuke</div>
        <input type="text" class="search-box" placeholder="Enter URL">
        <button class="button">Go</button>
    </div>
</body>
</html>
