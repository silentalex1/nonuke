<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced No Nuke Browser</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a0033 30%, #2d0054 60%, #3b0066 100%);
        }
        .navbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 10px;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }
        .nav-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .nav-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .mini-browser {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 80%;
            background-color: #0a0a0a;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .browser-bar {
            height: 50px;
            background-color: #1a0033;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
        }
        .browser-button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ff5f56;
        }
        .browser-button:nth-child(2) {
            background-color: #ffbd2e;
        }
        .browser-button:nth-child(3) {
            background-color: #27c93f;
        }
        .url-input {
            flex-grow: 1;
            height: 30px;
            background-color: #2d0054;
            border: none;
            border-radius: 15px;
            color: white;
            padding: 0 15px;
            font-size: 14px;
            outline: none;
        }
        .browser-content {
            flex-grow: 1;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #333;
        }
        .url-prompt {
            font-size: 24px;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: all 0.5s ease;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        .url-prompt:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="nav-button">Movies</a>
        <a href="#" class="nav-button">Games</a>
        <a href="#" class="nav-button">ToS</a>
        <a href="#" class="nav-button">Settings</a>
    </nav>
    <div class="mini-browser">
        <div class="browser-bar">
            <div class="browser-button"></div>
            <div class="browser-button"></div>
            <div class="browser-button"></div>
            <input type="text" class="url-input" placeholder="Enter URL" id="urlInput">
        </div>
        <div class="browser-content" id="browserContent">
            <div class="url-prompt" contenteditable="true" id="urlPrompt">Enter an URL</div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const urlPrompt = document.getElementById('urlPrompt');
        const browserContent = document.getElementById('browserContent');

        urlPrompt.addEventListener('input', function() {
            urlInput.value = this.textContent;
        });

        urlPrompt.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                loadURL();
            }
        });

        urlInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loadURL();
            }
        });

        function loadURL() {
            let url = urlInput.value;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            browserContent.innerHTML = `<div style="text-align: center;">
                <p>Simulating loading of: ${url}</p>
                <p>Account sign-out process initiated.</p>
                <p>For security reasons, actual sign-out cannot be performed.</p>
            </div>`;

            urlPrompt.style.display = 'none';
        }
    </script>
</body>
</html>
