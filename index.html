<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Nuke</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }
        #background {
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(103, 58, 183, 0.1) 0%, rgba(103, 58, 183, 0) 40%),
                radial-gradient(circle at 100% 100%, rgba(131, 58, 180, 0.1) 0%, rgba(131, 58, 180, 0) 40%),
                linear-gradient(135deg, #000000 0%, #1a0033 30%, #2d0054 60%, #3b0066 100%);
            position: relative;
            overflow: hidden;
        }
        .navbar {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 8px;
            display: flex;
            gap: 8px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }
        .nav-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 16px 32px;
            border-radius: 40px;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .nav-button:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }
        .nav-button:hover:before {
            transform: translateX(100%);
        }
        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }
        .mini-browser {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 70%;
            background-color: #000000;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .browser-bar {
            height: 60px;
            background-color: #1a0033;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }
        .url-input {
            flex-grow: 1;
            height: 40px;
            background-color: #2d0054;
            border: none;
            border-radius: 20px;
            color: white;
            padding: 0 20px;
            font-size: 16px;
            outline: none;
        }
        .browser-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .url-prompt {
            font-size: 24px;
            color: #ffffff;
            opacity: 0.7;
            text-align: center;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .url-prompt:hover {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div id="background">
        <nav class="navbar">
            <a href="#" class="nav-button">Movies</a>
            <a href="#" class="nav-button">Games</a>
            <a href="#" class="nav-button">ToS</a>
        </nav>
        <div class="mini-browser">
            <div class="browser-bar">
                <input type="text" class="url-input" placeholder="Enter URL" readonly>
            </div>
            <div class="browser-content">
                <div class="url-prompt">Enter an URL</div>
            </div>
        </div>
    </div>
</body>
</html>
