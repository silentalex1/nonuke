<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoNuke - Type Fast</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --primary-color: #8A2BE2;
            --secondary-color: #4B0082;
            --text-color: #FFFFFF;
            --background-color: #1a0033;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background: linear-gradient(135deg, var(--background-color), var(--secondary-color));
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            max-width: 800px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(90deg, var(--primary-color), #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--primary-color), 0 0 20px var(--primary-color);
            }
            to {
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px var(--primary-color), 0 0 40px var(--primary-color);
            }
        }

        #text-display {
            font-size: 1.5em;
            margin-bottom: 20px;
            line-height: 1.6;
            text-align: center;
            min-height: 3em;
            position: relative;
        }

        #text-display::after {
            content: '|';
            position: absolute;
            right: -10px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        #input-field {
            width: 100%;
            padding: 10px;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        #input-field:focus {
            outline: none;
            box-shadow: 0 0 10px var(--primary-color);
        }

        #stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .stat:hover {
            transform: scale(1.05);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.7;
        }

        #restart-btn {
            background: linear-gradient(90deg, var(--primary-color), #00ffff);
            border: none;
            color: #000;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary-color);
        }

        #mode-select {
            margin-bottom: 20px;
            padding: 10px;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border: none;
            border-radius: 5px;
        }

        .particle {
            position: absolute;
            background: var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes particleAnimation {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(0, -100px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NoNuke - Type Fast</h1>
        <select id="mode-select">
            <option value="time30">30 Seconds</option>
            <option value="time60" selected>60 Seconds</option>
            <option value="time120">2 Minutes</option>
            <option value="words25">25 Words</option>
            <option value="words50">50 Words</option>
            <option value="words100">100 Words</option>
        </select>
        <div id="text-display"></div>
        <input type="text" id="input-field" autocomplete="off" placeholder="Start typing here...">
        <div id="stats">
            <div class="stat">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="time">60</div>
                <div class="stat-label">Time Left</div>
            </div>
        </div>
        <button id="restart-btn">Restart</button>
    </div>

    <script>
        const textDisplay = document.getElementById('text-display');
        const inputField = document.getElementById('input-field');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const timeDisplay = document.getElementById('time');
        const restartBtn = document.getElementById('restart-btn');
        const modeSelect = document.getElementById('mode-select');

        let startTime, endTime;
        let timerInterval;
        let currentText = '';
        let typedCharacters = 0;
        let correctCharacters = 0;
        let currentWordIndex = 0;
        let testMode = 'time60';

        const texts = [
            "The quick brown fox jumps over the lazy dog.",
            "Programming is the art of telling another human what one wants the computer to do.",
            "The only way to learn a new programming language is by writing programs in it.",
            "The best error message is the one that never shows up.",
            "First, solve the problem. Then, write the code."
        ];

        function init() {
            currentText = texts[Math.floor(Math.random() * texts.length)];
            displayText();
            inputField.value = '';
            startTime = null;
            endTime = null;
            typedCharacters = 0;
            correctCharacters = 0;
            currentWordIndex = 0;
            clearInterval(timerInterval);
            setTimer();
            wpmDisplay.textContent = '0';
            accuracyDisplay.textContent = '100%';
            inputField.focus();
        }

        function displayText() {
            const words = currentText.split(' ');
            textDisplay.innerHTML = words.map((word, index) => 
                `<span class="word ${index === currentWordIndex ? 'current' : ''}">${word}</span>`
            ).join(' ');
        }

        function setTimer() {
            let timeLeft;
            if (testMode.startsWith('time')) {
                timeLeft = parseInt(testMode.slice(4));
            } else {
                timeLeft = 60; // Default for word count modes
            }
            timeDisplay.textContent = timeLeft;
        }

        function startTimer() {
            let timeLeft = parseInt(timeDisplay.textContent);
            timerInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;
                if (timeLeft === 0) {
                    endTest();
                }
            }, 1000);
        }

        function calculateWPM() {
            const words = typedCharacters / 5;
            const minutes = (Date.now() - startTime) / 60000;
            return Math.round(words / minutes);
        }

        function calculateAccuracy() {
            return Math.round((correctCharacters / typedCharacters) * 100);
        }

        function endTest() {
            clearInterval(timerInterval);
            inputField.disabled = true;
            wpmDisplay.textContent = calculateWPM();
            accuracyDisplay.textContent = `${calculateAccuracy()}%`;
        }

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            particle.style.width = `${Math.random() * 10 + 5}px`;
            particle.style.height = particle.style.width;
            document.body.appendChild(particle);

            particle.animate([
                { transform: 'translate(0, 0)', opacity: 1 },
                { transform: `translate(${Math.random() * 100 - 50}px, -100px)`, opacity: 0 }
            ], {
                duration: 1000,
                easing: 'cubic-bezier(0, .9, .57, 1)',
                fill: 'forwards'
            });

            setTimeout(() => particle.remove(), 1000);
        }

        inputField.addEventListener('input', (e) => {
            if (!startTime) {
                startTime = Date.now();
                startTimer();
            }

            const inputText = inputField.value;
            const currentWord = currentText.split(' ')[currentWordIndex];

            if (inputText.endsWith(' ') && inputText.trim() === currentWord) {
                currentWordIndex++;
                inputField.value = '';
                displayText();

                // Create particle effect
                const rect = inputField.getBoundingClientRect();
                createParticle(rect.right, rect.top);
            }

            typedCharacters++;
            if (inputText[inputText.length - 1] === currentText[typedCharacters - 1]) {
                correctCharacters++;
            }

            if (testMode.startsWith('words') && currentWordIndex >= parseInt(testMode.slice(5))) {
                endTest();
            }

            wpmDisplay.textContent = calculateWPM();
            accuracyDisplay.textContent = `${calculateAccuracy()}%`;
        });

        restartBtn.addEventListener('click', init);

        modeSelect.addEventListener('change', (e) => {
            testMode = e.target.value;
            init();
        });

        init();
    </script>
</body>
</html>
