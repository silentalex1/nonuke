<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoNuke - Type Fast</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a0033, #4d004d);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            max-width: 800px;
            width: 100%;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #text-display {
            font-size: 1.5em;
            margin-bottom: 20px;
            line-height: 1.6;
            text-align: center;
        }
        #input-field {
            width: 100%;
            padding: 10px;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            margin-bottom: 20px;
        }
        #stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.9em;
            opacity: 0.7;
        }
        #restart-btn {
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            border: none;
            color: #000;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        #restart-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NoNuke - Type Fast</h1>
        <div id="text-display"></div>
        <input type="text" id="input-field" autocomplete="off" placeholder="Start typing here...">
        <div id="stats">
            <div class="stat">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="time">60</div>
                <div class="stat-label">Time Left</div>
            </div>
        </div>
        <button id="restart-btn">Restart</button>
    </div>

    <script>
        const textDisplay = document.getElementById('text-display');
        const inputField = document.getElementById('input-field');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const timeDisplay = document.getElementById('time');
        const restartBtn = document.getElementById('restart-btn');

        let startTime, endTime;
        let timerInterval;
        let currentText = '';
        let typedCharacters = 0;
        let correctCharacters = 0;

        const texts = [
            "The quick brown fox jumps over the lazy dog.",
            "Programming is the art of telling another human what one wants the computer to do.",
            "The only way to learn a new programming language is by writing programs in it.",
            "The best error message is the one that never shows up.",
            "First, solve the problem. Then, write the code."
        ];

        function init() {
            currentText = texts[Math.floor(Math.random() * texts.length)];
            textDisplay.textContent = currentText;
            inputField.value = '';
            startTime = null;
            endTime = null;
            typedCharacters = 0;
            correctCharacters = 0;
            clearInterval(timerInterval);
            timeDisplay.textContent = '60';
            wpmDisplay.textContent = '0';
            accuracyDisplay.textContent = '100%';
            inputField.focus();
        }

        function startTimer() {
            let timeLeft = 60;
            timerInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;
                if (timeLeft === 0) {
                    endTest();
                }
            }, 1000);
        }

        function calculateWPM() {
            const words = typedCharacters / 5;
            const minutes = (Date.now() - startTime) / 60000;
            return Math.round(words / minutes);
        }

        function calculateAccuracy() {
            return Math.round((correctCharacters / typedCharacters) * 100);
        }

        function endTest() {
            clearInterval(timerInterval);
            inputField.disabled = true;
            wpmDisplay.textContent = calculateWPM();
            accuracyDisplay.textContent = `${calculateAccuracy()}%`;
        }

        inputField.addEventListener('input', () => {
            if (!startTime) {
                startTime = Date.now();
                startTimer();
            }

            const inputText = inputField.value;
            typedCharacters++;

            if (inputText[inputText.length - 1] === currentText[inputText.length - 1]) {
                correctCharacters++;
            }

            if (inputText === currentText) {
                endTest();
            }

            wpmDisplay.textContent = calculateWPM();
            accuracyDisplay.textContent = `${calculateAccuracy()}%`;
        });

        restartBtn.addEventListener('click', init);

        init();
    </script>
</body>
</html>
