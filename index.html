<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Nuke</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Poppins', sans-serif;
        }
        #background {
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(103, 58, 183, 0.05) 0%, rgba(103, 58, 183, 0) 50%),
                radial-gradient(circle at 90% 90%, rgba(131, 58, 180, 0.05) 0%, rgba(131, 58, 180, 0) 50%),
                linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            position: relative;
            overflow: hidden;
        }
        .shape {
            position: absolute;
            opacity: 0.03;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s ease;
        }
        .circle {
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        .square {
            border-radius: 15px;
            animation: rotate 30s infinite linear;
        }
        .rectangle {
            border-radius: 20px;
            animation: pulse 15s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .navbar {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 5px;
            display: flex;
            gap: 5px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 300;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .nav-button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div id="background">
        <div class="shape circle" style="width: 300px; height: 300px; top: 10%; left: 5%;"></div>
        <div class="shape square" style="width: 200px; height: 200px; top: 60%; left: 80%;"></div>
        <div class="shape rectangle" style="width: 400px; height: 200px; top: 40%; left: 30%; transform: rotate(45deg);"></div>
        <div class="shape circle" style="width: 150px; height: 150px; top: 80%; left: 20%;"></div>
        <div class="shape square" style="width: 100px; height: 100px; top: 30%; left: 70%;"></div>
        <div class="shape rectangle" style="width: 300px; height: 100px; top: 70%; left: 50%; transform: rotate(-30deg);"></div>

        <nav class="navbar">
            <a href="#" class="nav-button">Movies</a>
            <a href="#" class="nav-button">Games</a>
            <a href="#" class="nav-button">ToS</a>
        </nav>
    </div>
</body>
</html>
