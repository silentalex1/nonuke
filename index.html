<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoNuke - Type Fast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .navbar {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 0;
            text-align: center;
            position: absolute;
            top: 0;
            z-index: 10;
            transition: background 0.3s;
        }

        .navbar a {
            margin: 0 15px;
            color: #ffb6c1;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s, transform 0.2s;
        }

        .navbar a:hover {
            color: #4a00e0;
            transform: scale(1.1);
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            padding: 40px;
            margin-top: 70px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 60px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 2.5rem;
            color: #ffb6c1;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .typing-box {
            position: relative;
            margin: 20px 0;
            padding: 25px;
            background: #222;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }

        .typing-box:hover {
            transform: scale(1.02);
        }

        #text-output {
            font-size: 1.5rem;
            color: #ddd;
            min-height: 150px;
            text-align: left;
            line-height: 1.5;
        }

        #user-input {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background-color: #444;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: background-color 0.3s;
        }

        #user-input:focus {
            background-color: #555;
        }

        .progress {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #4a00e0;
            transition: width 0.5s ease;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .stats div {
            flex: 1;
            text-align: center;
            margin: 0 10px;
            transition: transform 0.2s;
        }

        .stats div:hover {
            transform: scale(1.05);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .footer a {
            color: #6e3cbc;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .stats {
                flex-direction: column;
            }

            .stats div {
                margin: 10px 0;
            }

            #user-input {
                font-size: 0.9rem;
                padding: 12px;
            }

            #text-output {
                font-size: 1.2rem;
            }
        }

        /* Additional Styles for Animation */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #4a00e0;
            border-radius: 50%;
            pointer-events: none;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="https://nonuke.me/createaccount/account">Create Account</a>
        <a href="https://nonuke.me/leaderboard/leader">Leaderboard</a>
        <a href="https://nonuke.me/multiplayer">Multiplayer</a>
    </div>

    <div class="container">
        <h1>NoNuke - Type Fast</h1>

        <div class="typing-box">
            <div id="text-output"></div>
            <div class="progress">
                <div class="progress-bar" id="progress-bar" style="width: 0;"></div>
            </div>
        </div>

        <input type="text" id="user-input" placeholder="Start typing here..." autofocus>

        <div class="stats">
            <div>
                <h2 id="wpm">0</h2>
                <p>Words per Minute</p>
            </div>
            <div>
                <h2 id="accuracy">100%</h2>
                <p>Accuracy</p>
            </div>
            <div>
                <h2 id="time">0</h2>
                <p>Time (s)</p>
            </div>
        </div>

        <div class="footer">
            <p>Created by NoNuke Dev Team | <a href="#">Privacy Policy</a></p>
        </div>
    </div>

    <script>
        const wordsArray = ['hello', 'world', 'fast', 'type', 'keyboard', 'speed', 'accuracy', 'random', 'challenge', 'skill', 'practice', 'improve', 'complexity', 'multiplayer', 'adaptive', 'AI', 'streak', 'lesson', 'performance', 'leaderboard'];
        let randomizedWords = '';
        let textOutput = document.getElementById('text-output');
        let userInput = document.getElementById('user-input');
        let wpmDisplay = document.getElementById('wpm');
        let accuracyDisplay = document.getElementById('accuracy');
        let timeDisplay = document.getElementById('time');
        let progressBar = document.getElementById('progress-bar');

        let startTime;
        let wordCount = 0;
        let correctCharacters = 0;
        let totalCharacters = 0;

        function generateRandomWords() {
            randomizedWords = '';
            for (let i = 0; i < 15; i++) {
                const randomWord = wordsArray[Math.floor(Math.random() * wordsArray.length)];
                randomizedWords += randomWord + ' ';
            }
            textOutput.textContent = randomizedWords.trim();
        }

        generateRandomWords();

        userInput.addEventListener('input', function () {
            const inputText = userInput.value;
            const displayedText = textOutput.textContent;

            if (!startTime) {
                startTime = new Date();
            }

            totalCharacters = inputText.length;
            correctCharacters = 0;

            for (let i = 0; i < inputText.length; i++) {
                if (inputText[i] === displayedText[i]) {
                    correctCharacters++;
                    if (i % 5 === 0) generateParticle();
                } else {
                    shakeScreen();
                }
            }

            const elapsedTime = (new Date() - startTime) / 1000;
            wordCount = inputText.split(' ').length;

            const wpm = Math.floor((wordCount / elapsedTime) * 60);
            const accuracy = ((correctCharacters / totalCharacters) * 100) || 0;

            wpmDisplay.textContent = wpm;
            accuracyDisplay.textContent = accuracy.toFixed(2) + '%';
            timeDisplay.textContent = Math.floor(elapsedTime);

            updateProgressBar(elapsedTime);
        });

        function updateProgressBar(elapsedTime) {
            const maxTime = 60; // 60 seconds
            const width = Math.min((elapsedTime / maxTime) * 100, 100);
            progressBar.style.width = width + '%';
        }

        function shakeScreen() {
            document.body.classList.add('shake');
            setTimeout(() => {
                document.body.classList.remove('shake');
            }, 500);
        }

        function generateParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.top = Math.random() * window.innerHeight + 'px';
            particle.style.left = Math.random() * window.innerWidth + 'px';
            document.body.appendChild(particle);
            setTimeout(() => {
                particle.remove();
            }, 1000);
        }

        window.onload = () => {
            userInput.focus();
        };
    </script>
</body>
</html>
