<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>NoNuke - Type Fast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            color: #ffb6c1;
            margin-bottom: 20px;
        }

        .typing-box {
            position: relative;
            margin: 20px 0;
            padding: 25px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
        }

        #text-output {
            font-size: 1.5rem;
            color: #ddd;
            min-height: 150px;
            text-align: left;
        }

        #user-input {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            border: 2px solid #4a00e0;
            border-radius: 10px;
            background-color: #222;
            color: #fff;
            font-size: 1.2rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .progress {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #4a00e0;
            transition: width 0.5s ease;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .stats div {
            flex: 1;
            text-align: center;
            margin: 10px;
        }

        .footer {
            margin-top: 40px;
            font-size: 1rem;
            opacity: 0.6;
        }

        .footer a {
            color: #6e3cbc;
            text-decoration: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #ffb6c1;
            border-radius: 50%;
            animation: fly 1.2s ease-in-out forwards;
        }

        @keyframes fly {
            to {
                transform: translateY(-150px) translateX(90px);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .stats {
                flex-direction: column;
            }

            .stats div {
                margin: 15px 0;
            }

            #user-input {
                font-size: 1rem;
                padding: 15px;
            }

            #text-output {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NoNuke - Type Fast</h1>

        <div class="typing-box">
            <div id="text-output"></div>
            <div class="progress">
                <div class="progress-bar" id="progress-bar" style="width: 0;"></div>
            </div>
        </div>

        <input type="text" id="user-input" placeholder="Start typing here..." autofocus>

        <div class="stats">
            <div>
                <h2 id="wpm">0</h2>
                <p>Words per Minute</p>
            </div>
            <div>
                <h2 id="accuracy">100%</h2>
                <p>Accuracy</p>
            </div>
            <div>
                <h2 id="time">0</h2>
                <p>Time (s)</p>
            </div>
        </div>

        <div class="footer">
            <p>Created by NoNuke Dev Team | <a href="#">Privacy Policy</a></p>
        </div>
    </div>

    <script>
        const wordsArray = ['hello', 'world', 'fast', 'type', 'keyboard', 'speed', 'accuracy', 'random', 'challenge', 'skill', 'practice', 'improve', 'complexity', 'multiplayer', 'adaptive', 'AI', 'streak', 'lesson', 'performance', 'leaderboard'];
        let randomizedWords = '';
        let textOutput = document.getElementById('text-output');
        let userInput = document.getElementById('user-input');
        let wpmDisplay = document.getElementById('wpm');
        let accuracyDisplay = document.getElementById('accuracy');
        let timeDisplay = document.getElementById('time');
        let progressBar = document.getElementById('progress-bar');

        let startTime;
        let wordCount = 0;
        let correctCharacters = 0;
        let totalCharacters = 0;

        function generateRandomWords() {
            randomizedWords = '';
            for (let i = 0; i < 15; i++) {
                const randomWord = wordsArray[Math.floor(Math.random() * wordsArray.length)];
                randomizedWords += randomWord + ' ';
            }
            textOutput.textContent = randomizedWords.trim();
        }

        generateRandomWords();

        userInput.addEventListener('input', function () {
            const inputText = userInput.value;
            const displayedText = textOutput.textContent;

            if (!startTime) {
                startTime = new Date();
            }

            totalCharacters = inputText.length;
            correctCharacters = 0;

            for (let i = 0; i < inputText.length; i++) {
                if (inputText[i] === displayedText[i]) {
                    correctCharacters++;
                    if (i % 5 === 0) generateParticle();
                } else {
                    shakeScreen();
                }
            }

            const elapsedTime = (new Date() - startTime) / 1000;
            wordCount = inputText.split(' ').length;

            const wpm = Math.round((wordCount / elapsedTime) * 60);
            wpmDisplay.textContent = wpm;

            const accuracy = ((correctCharacters / totalCharacters) * 100).toFixed(2);
            accuracyDisplay.textContent = isNaN(accuracy) ? '100%' : `${accuracy}%`;

            timeDisplay.textContent = Math.round(elapsedTime);
            progressBar.style.width = `${(inputText.length / displayedText.length) * 100}%`;
        });

        function generateParticle() {
            let particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = `${Math.random() * window.innerWidth}px`;
            particle.style.top = `${Math.random() * window.innerHeight}px`;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 600);
        }

        function shakeScreen() {
            document.body.classList.add('shaking');
            setTimeout(() => document.body.classList.remove('shaking'), 300);
        }

        function adaptiveDifficulty() {
            if (parseInt(wpmDisplay.textContent) > 80) {
                generateRandomWords();
                alert('Level Up: Increasing difficulty!');
            }
        }

        setInterval(() => {
            adaptiveDifficulty();
        }, 10000);
    </script>
</body>
</html>
